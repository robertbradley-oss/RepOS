<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 134 116" role="img" aria-labelledby="reposMarkTitle">
  <title id="reposMarkTitle">RepOS mark</title>
  <defs>
    <linearGradient id="reposGrad" x1="4" y1="10" x2="124" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9b86ff"/>
      <stop offset="0.52" stop-color="#6c43f0"/>
      <stop offset="1" stop-color="#4a1fc4"/>
    </linearGradient>
  </defs>
  <!-- speed bars -->
  <rect x="6" y="27" width="52" height="13" rx="6.5" fill="url(#reposGrad)"/>
  <rect x="6" y="75" width="52" height="13" rx="6.5" fill="url(#reposGrad)"/>
  <!-- typing dots -->
  <circle cx="40" cy="57.5" r="5.9" fill="url(#reposGrad)"/>
  <circle cx="58" cy="57.5" r="5.9" fill="url(#reposGrad)"/>
  <circle cx="76" cy="57.5" r="5.9" fill="url(#reposGrad)"/>
  <!-- chat bubble ring, open toward the bars -->
  <path d="M63.5 35.4 A33 33 0 1 1 63.5 79.6" fill="none" stroke="url(#reposGrad)" stroke-width="13" stroke-linecap="round"/>
  <!-- bubble tail -->
  <path d="M80 85 L86 107 L99 86 Z" fill="url(#reposGrad)"/>
</svg>
